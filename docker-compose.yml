services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-secret}
      MYSQL_DATABASE: ${DB_NAME:-membership_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      maildev:
        condition: service_started
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      MAIL_HOST: maildev

  admin:
    build: ./apps/admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

volumes:
  mysql_data:
